version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qoocca-api
    restart: always
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 핵심: 스프링 설정 계층구조(jwt.secret)를 환경변수(JWT_SECRET)로 매핑
      JWT_SECRET: ${SECRET_KEY}
      JWT_COOKIE_ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # DB 설정
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}

      # Redis 설정 (내부 네트워크이므로 서비스명 'redis' 사용)
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      # 나머지 인프라 변수
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      NAVER_REDIRECT_URI: ${NAVER_REDIRECT_URI}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EC2_PUBLIC_IP: ${EC2_PUBLIC_IP}

      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx1g -XX:+UseG1GC"
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
      - academy_images_data:/app/uploads
    depends_on:
      - redis
    networks:
      - teachers_network

  redis:
    image: redis:latest
    container_name: basic-redis
    restart: always
    networks:
      - teachers_network

  nginx:
    image: nginx:latest
    container_name: nginx-image-server
    restart: always
    ports:
      - "8081:80"
    volumes:
      - academy_images_data:/usr/share/nginx/html/academy
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - teachers_network

volumes:
  academy_images_data:

networks:
  teachers_network:
    driver: bridge