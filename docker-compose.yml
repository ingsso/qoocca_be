services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qoocca-api
    restart: always
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
      SPRING_JPA_OPEN_IN_VIEW: "false"
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "false"
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: "OFF"
      LOGGING_LEVEL_ORG_HIBERNATE_ORM_JDBC_BIND: "OFF"
      LOGGING_LEVEL_ORG_HIBERNATE_TYPE_DESCRIPTOR_SQL_BASICBINDER: "OFF"
      LOGGING_LEVEL_COM_QOOCCA_TEACHERS_API_USER_SERVICE_SMSSERVICE: "WARN"
      SMS_VERIFY_SKIP_USER_LOOKUP: "false"
      SECURITY_BCRYPT_STRENGTH: "10"
      SERVER_TOMCAT_THREADS_MAX: "120"
      SERVER_TOMCAT_THREADS_MIN_SPARE: "20"
      SERVER_TOMCAT_ACCEPT_COUNT: "300"
      SERVER_TOMCAT_MAX_CONNECTIONS: "4096"
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
      - academy_images_data:/app/uploads
    depends_on:
      - redis
    networks:
      - teachers_network

  mysql:
    profiles: ["local-infra"]
    image: mysql:8.4
    container_name: basic-mysql
    restart: always
    command:
      - --slow_query_log=1
      - --long_query_time=0.5
      - --log_output=FILE
      - --slow_query_log_file=/var/lib/mysql/slow-query.log
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - teachers_network

  redis:
    image: redis:latest
    container_name: basic-redis
    restart: always
    networks:
      - teachers_network

  nginx:
    image: nginx:latest
    container_name: nginx-image-server
    ports:
      - "8081:80"
    volumes:
      - academy_images_data:/usr/share/nginx/html/academy
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    restart: always
    networks:
      - teachers_network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - teachers_network

  mysqld_exporter:
    profiles: ["local-infra"]
    image: prom/mysqld-exporter:latest
    container_name: mysqld-exporter
    restart: always
    command:
      - "--config.my-cnf=/etc/mysqld_exporter/my.cnf"
    volumes:
      - ./monitoring/mysql/exporter.my.cnf:/etc/mysqld_exporter/my.cnf:ro
    depends_on:
      - mysql
    ports:
      - "9104:9104"
    networks:
      - teachers_network

  k6:
    image: grafana/k6:latest
    container_name: k6
    working_dir: /scripts
    volumes:
      - ./performance/k6:/scripts
    entrypoint: ["sleep", "infinity"]
    networks:
      - teachers_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    depends_on:
      - prometheus
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - teachers_network

volumes:
  grafana_data:
  mysql_data:
    driver: local
  academy_images_data:
  redis_volume_data:
  redis_insight_volume_data:

networks:
  teachers_network:
    driver: bridge
